<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音為台北 - AI 語音導覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=4">
    <!-- 加入 FontAwesome 供 icon 使用 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container play-taipei-container">
        
        <!-- 頂部 Navbar / 返回鍵 / 登出鍵 -->
        <div class="header-nav">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
            <h2>AI 在地嚮導</h2>
            <button class="back-btn" onclick="logout()" style="margin-left: 10px; margin-right: 0; outline: none; border: none; cursor: pointer; font-size: 0.95rem;">登出</button>
        </div>



        <!-- 聊天室歷史記錄區塊 -->
        <div id="chat-history" class="chat-history" style="height: 300px; overflow-y: auto; background: rgba(255,255,255,0.5); border-radius: 12px; padding: 15px; margin-top: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
             <!-- 對話泡泡會動態塞在這裡 -->
        </div>

        <!-- 垂直時間軸展演區 -->
        <div id="itinerary-display" class="itinerary-display">
            <!-- JS 動態插入點 -->
        </div>

        <!-- 全局狀態提示文字 -->
        <div id="status-text" class="status-text">想去哪裡玩？按住麥克風告訴我！</div>

        <!-- 綜合輸入區塊 (文字 + 語音) -->
        <div class="input-container" style="display: flex; align-items: center; gap: 10px; background: white; border-radius: 30px; padding: 5px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <input type="text" id="text-input" placeholder="輸入你想去哪裡？..." style="flex: 1; border: none; outline: none; font-size: 1rem; padding: 10px; background: transparent;">
            
            <button id="send-button" style="background: #2563eb; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.3s; flex-shrink: 0;">
                <i class="fas fa-paper-plane"></i>
            </button>
            <button id="record-button" class="record-button" style="background: #2563eb; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; transition: background 0.3s; flex-shrink: 0;">
                 <i class="fas fa-microphone"></i>
            </button>
        </div>
    </div>

    <!-- 載入專屬的微服務調度 JS -->
    <script src="play_taipei.js?v=3"></script>
    <script>
        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('currentUserName');
            window.location.href = '/';
        }
    </script>
</body>
</html>
