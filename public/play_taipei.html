<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音為台北 - AI 語音導覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=4">
    <!-- 加入 FontAwesome 供 icon 使用 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container play-taipei-container">
        
        <!-- 頂部 Navbar / 返回鍵 -->
        <div class="header-nav">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
            <h2>AI 在地嚮導</h2>
        </div>



        
        <!-- Stage 1: Chat View -->
        <div id="chat-view">
            <!-- 聊天室歷史記錄區塊 -->
            <div id="chat-history" class="chat-history" style="height: 55vh; overflow-y: auto; background: rgba(255,255,255,0.5); border-radius: 12px; padding: 15px; margin-top: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
                 <!-- 對話泡泡會動態塞在這裡 -->
            </div>
            <!-- 全局狀態提示文字 -->
            <div id="status-text" class="status-text">請輸入您的行程規劃需求...</div>

            <!-- 純文字輸入區塊 -->
            <div class="input-container" style="display: flex; align-items: center; gap: 10px; background: white; border-radius: 30px; padding: 5px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <input type="text" id="text-input" placeholder="輸入你想去哪裡？預算？幾間餐廳？..." style="flex: 1; border: none; outline: none; font-size: 1rem; padding: 10px; background: transparent;">
                
                <button id="send-button" style="background: #2563eb; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.3s; flex-shrink: 0;">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <!-- Stage 2: Gallery View (Hidden by default) -->
        <div id="gallery-view" style="display: none; height: 70vh; overflow-y: auto;">
            <div id="gallery-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px;"></div>
            <button id="start-picking-btn" onclick="startSwipePhase()" style="width: 100%; padding: 15px; margin-top: 15px; background: #2563eb; color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer;">所有景點都看過了，開始選妃吧！</button>
        </div>

        <!-- Stage 3: Swipe View (Hidden by default) -->
        <div id="swipe-view" style="display: none; height: 70vh; position: relative; overflow: hidden; align-items: center; justify-content: center; flex-direction: column;">
            <div id="card-stack" style="width: 100%; height: 80%; position: relative; display: flex; justify-content: center; align-items: center;"></div>
            
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <button onclick="handleSwipe('left')" style="width: 60px; height: 60px; border-radius: 50%; background: white; color: #ef4444; border: 2px solid #ef4444; font-size: 1.5rem; cursor: pointer;"><i class="fas fa-times"></i></button>
                <button onclick="handleSwipe('right')" style="width: 60px; height: 60px; border-radius: 50%; background: white; color: #10b981; border: 2px solid #10b981; font-size: 1.5rem; cursor: pointer;"><i class="fas fa-heart"></i></button>
            </div>
            
            <div id="swipe-stats" style="text-align: center; margin-top: 15px; font-weight: bold; color: #1e40af;">進度：0 選中</div>
        </div>

        <!-- Stage 4: Itinerary View (Hidden by default) -->
        <div id="itinerary-view" style="display: none; height: 75vh; overflow-y: auto;">
            <h3 style="text-align: center; color: #1e40af;">您的專屬行程表</h3>
            <div id="itinerary-display" class="itinerary-display">
                <!-- JS 動態插入點 -->
            </div>
            <button onclick="location.reload()" style="width: 100%; padding: 15px; margin-top: 10px; background: #1e40af; color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer;">重新規劃</button>
        </div>
    </div>


    <!-- 載入專屬的微服務調度 JS -->
    <script src="play_taipei.js?v=4"></script>
    <script>
        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('currentUserName');
            window.location.href = '/';
        }
    </script>
</body>
</html>
