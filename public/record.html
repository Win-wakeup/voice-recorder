<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Studio - 終極自動翻譯解說</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .pipeline-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 2rem;
        }
        
        .pulse-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6366f1, #c084fc);
            color: white;
            font-size: 3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px auto;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
        }
        .pulse-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(192, 132, 252, 0.7);
        }
        .pulse-btn.recording {
            animation: record-pulse 1.5s infinite;
            background: linear-gradient(135deg, #ef4444, #f97316);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
        }
        @keyframes record-pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
            50% { transform: scale(0.95); box-shadow: 0 0 50px rgba(239, 68, 68, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        }

        .step-indicator {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 600;
            min-height: 28px;
            transition: color 0.3s;
        }
        
        .step-indicator.active {
            color: #4ade80;
        }

        .transcript-box {
            background: rgba(0,0,0,0.4);
            border-left: 4px solid #c084fc;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
            display: none;
        }

        .transcript-box.show {
            display: block;
            animation: fade-in 0.5s ease forwards;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div id="view-guide" class="view active" style="width:100%;">
            
            <p id="guide-greeting" style="color:#c084fc; font-weight:bold; margin-bottom: 1rem; font-size:1.3rem; text-align:center;"></p>
            <h1 style="text-align:center; font-family:'Noto Sans TC'; margin-bottom: 0.5rem;">AI 導遊雙語播報台</h1>
            <p style="text-align:center; color:var(--text-muted);">說出中文導覽，AI 自動翻譯並以「您的聲音」說出道地英文！</p>

            <div class="pipeline-card">
                <div class="step-indicator" id="pipeline-status">準備就緒，點擊麥克風開始錄音</div>
                
                <div class="record-button-wrapper" style="position:relative;">
                    <button class="pulse-btn" id="master-record-btn" title="Start Recording">
                        <span id="btn-icon">🎙️</span>
                    </button>
                    <div id="recording-timer" style="font-family:monospace; font-size:1.5rem; color:#cbd5e1; display:none;">00:00</div>
                </div>

                <div class="audio-player-container" id="playerContainer" style="display:none; margin-top:20px;">
                    <p style="color:#4ade80; font-weight:bold; margin-bottom:10px;">🎧 您的英文專屬導覽已生成：</p>
                    <audio id="audioPlayback" controls style="width:100%; border-radius:20px;"></audio>
                </div>

                <div class="transcript-box" id="transcript-box">
                    <strong style="color: #00d2ff;">🇹🇼 您剛才說：</strong>
                    <p id="trans-zh" style="margin: 10px 0 20px 0; font-size:1.05rem; line-height:1.6;"></p>
                    
                    <strong style="color: #ff9900;">🇺🇸 AI 道地翻譯：</strong>
                    <p id="trans-en" style="margin: 10px 0 0 0; font-size:1.05rem; line-height:1.6;"></p>
                </div>
            </div>
            
            <a class="logout-link" href="#" id="logout-btn" style="margin-top:2rem;">登出目前帳號</a>
        </div>
    </div>
    <script>
        const currentUser = localStorage.getItem('currentUser');
        const currentUserName = localStorage.getItem('currentUserName');
        if(!currentUser) window.location.href = '/';
        
        document.getElementById('guide-greeting').innerText = `歡迎回來，${currentUserName}！`;
        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); window.location.href = '/'; };
        
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8000' : '';

        let recorder = null;
        let chunks = [];
        let isRecording = false;
        let seconds = 0;
        let timerInterval = null;

        const recordBtn = document.getElementById('master-record-btn');
        const btnIcon = document.getElementById('btn-icon');
        const statusEl = document.getElementById('pipeline-status');
        const timerDisplay = document.getElementById('recording-timer');
        const transcriptBox = document.getElementById('transcript-box');
        const playerContainer = document.getElementById('playerContainer');
        const audioPlayback = document.getElementById('audioPlayback');

        const transZh = document.getElementById('trans-zh');
        const transEn = document.getElementById('trans-en');

        function updateTimer() {
            seconds++;
            const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }

        recordBtn.onclick = async () => {
            if (!isRecording) {
                // START RECORDING
                try {
                    chunks = [];
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    recorder = new MediaRecorder(stream);
                    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    recorder.onstop = processFullPipeline;
                    recorder.start(10); // Capture chunk every 10ms

                    isRecording = true;
                    recordBtn.classList.add('recording');
                    btnIcon.innerText = "⏹";
                    statusEl.innerText = "🎙️ 正在聆聽您的解說...";
                    statusEl.className = "step-indicator";
                    
                    transcriptBox.classList.remove('show');
                    playerContainer.style.display = 'none';
                    seconds = 0;
                    timerDisplay.textContent = "00:00";
                    timerDisplay.style.display = "block";
                    timerInterval = setInterval(updateTimer, 1000);
                } catch (err) {
                    statusEl.innerText = "❌ 錯誤：無法存取麥克風";
                    statusEl.style.color = "#ef4444";
                }
            } else {
                // STOP RECORDING
                if (recorder && recorder.state !== 'inactive') {
                    recorder.stop();
                    recorder.stream.getTracks().forEach(track => track.stop());
                }
                clearInterval(timerInterval);
                timerDisplay.style.display = "none";
                isRecording = false;
                recordBtn.classList.remove('recording');
                btnIcon.innerText = "⏳";
                statusEl.innerText = "🔄 準備處理音檔...";
                statusEl.className = "step-indicator";
            }
        };

        async function processFullPipeline() {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            
            // 1. Upload to Cloudinary & trigger STT
            const uploadForm = new FormData();
            uploadForm.append('userId', currentUser);
            uploadForm.append('voiceNote', blob);

            btnIcon.innerText = "🎙️";
            statusEl.innerText = "⏳ 步驟 1/4: 上傳音檔至伺服器...";
            
            try {
                const uploadRes = await fetch('/api/upload', { method: 'POST', body: uploadForm });
                const uploadText = await uploadRes.text();
                if(!uploadRes.ok) throw new Error("Upload Failed: " + uploadText);
                const uploadData = JSON.parse(uploadText);

                // 2. Perform STT
                statusEl.innerText = "🤖 步驟 2/4: AI 語音辨識 (STT) 處理中...";
                const sttReq = await fetch(`${API_BASE}/api/stt`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio_path: uploadData.url })
                });
                const sttText = await sttReq.text();
                if(!sttReq.ok) throw new Error("STT 連線失敗: " + sttText.substring(0, 50));
                
                let sttData;
                try { sttData = JSON.parse(sttText); } catch (e) { throw new Error("STT 回傳格式錯誤: " + sttText.substring(0, 50)); }
                if(sttData.status !== 'success') throw new Error(sttData.error || "STT 失敗");
                
                transcriptBox.classList.add('show');
                transZh.innerText = sttData.text;
                transEn.innerText = "...等待 AI 翻譯潤飾中...";

                // 3. Perform Translation
                statusEl.innerText = "🌍 步驟 3/4: 分析語意，翻譯成道地英文...";
                const transReq = await fetch(`${API_BASE}/api/translate`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: sttData.text,
                        ride_id: currentUser 
                    })
                });
                const transData = await transReq.json();

                if(!transData.final_english || transData.final_english.startsWith('(')) throw new Error(`翻譯失敗: ${transData.final_english || transData.detail || '未知錯誤'}`);
                
                transEn.innerText = transData.final_english;

                // 4. TTS with pre-enrolled voice
                statusEl.innerText = "🪄 步驟 4/4: ElevenLabs 正在用您的聲音合成英文語音...";
                
                const savedVoiceId = localStorage.getItem('voice_id');
                if (!savedVoiceId) throw new Error("找不到聲紋 ID，請重新完成聲紋註冊！");

                const ttsForm = new FormData();
                ttsForm.append('voice_id', savedVoiceId);
                ttsForm.append('text', transData.final_english);

                const ttsRes = await fetch(`${API_BASE}/api/tts`, { method: 'POST', body: ttsForm });
                if (!ttsRes.ok) {
                    const errJson = await ttsRes.json().catch(() => ({}));
                    throw new Error(`Voice TTS 失敗: ${errJson.error || ttsRes.status}`);
                }

                const ttsBlob = await ttsRes.blob();
                const ttsUrl = URL.createObjectURL(ttsBlob);
                
                // Final Output
                statusEl.innerText = "🎉 完美達成！請直接點擊下方播放您的英文專屬語音！";
                statusEl.classList.add('active');
                
                audioPlayback.src = ttsUrl;
                playerContainer.style.display = 'block';
                audioPlayback.play();

                // 🔄 Fire-and-forget: add this recording to the voice model for continuous improvement
                const sampleForm = new FormData();
                sampleForm.append('voice_id', savedVoiceId);
                sampleForm.append('file', blob, 'sample.webm');
                fetch(`${API_BASE}/api/add_voice_sample`, { method: 'POST', body: sampleForm })
                    .then(r => r.json())
                    .then(d => console.log('🎙️ Voice sample added:', d.status))
                    .catch(e => console.warn('Voice sample add skipped:', e));
                
            } catch (err) {
                console.error(err);
                statusEl.innerText = `❌ 處理失敗: ${err.message}`;
                statusEl.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
