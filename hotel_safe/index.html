<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台灣合法旅宿查詢系統 | 安心住宿</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script>
      // 防閃爍 (FOUC) 處理：如果偵測到非中文的翻譯 Cookie，則先隱藏畫面直到翻譯完成
      (function() {
        var match = document.cookie.match(/googtrans=\/zh-TW\/([a-z-]+)/i);
        var isReverting = sessionStorage.getItem('revertingToZh') === 'true';
        if ((match && match[1] && match[1] !== 'zh-TW') || isReverting) {
          // 1. 立即隱藏 body
          document.write('<style id="anti-flicker">body { opacity: 0 !important; overflow: hidden !important; }</style>');
          
          document.addEventListener('DOMContentLoaded', function() {
            if (isReverting) {
              sessionStorage.removeItem('revertingToZh');
            }
            var langMap = {
              'en': 'English',
              'ja': '日本語',
              'ko': '한국어',
              'th': 'ภาษาไทย',
              'vi': 'Tiếng Việt',
              'id': 'Bahasa Indonesia'
            };
            var langText = isReverting ? '繁體中文...' : ((match && match[1] && langMap[match[1]]) ? langMap[match[1]] + '...' : 'Translating...');
            
            // 2. 建立載入中畫面
            var loader = document.createElement('div');
            loader.id = 'translate-loader';
            loader.className = 'notranslate';
            loader.innerHTML = '<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#020617; z-index:99999; display:flex; justify-content:center; align-items:center; flex-direction:column; color:#f8fafc; font-family:sans-serif;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg><div style="margin-top:1rem; font-size:1.1rem; letter-spacing:1px; color:#34d399;">' + langText + '</div><style>@keyframes spin { 100% { transform: rotate(360deg); } }</style></div>';
            document.documentElement.appendChild(loader);
            
            var observer = null;
            var fallbackTimer = null;
            
            function revealPage() {
              if (fallbackTimer) clearTimeout(fallbackTimer);
              if (observer) observer.disconnect();
              var af = document.getElementById('anti-flicker');
              if (af) af.parentNode.removeChild(af);
              var ld = document.getElementById('translate-loader');
              if (ld) {
                ld.style.opacity = '0';
                ld.style.transition = 'opacity 0.4s ease';
                setTimeout(function() { if (ld.parentNode) ld.parentNode.removeChild(ld); }, 400);
              }
              document.body.style.opacity = '1';
              document.body.style.transition = 'opacity 0.4s ease-in';
              document.body.style.overflow = '';
            }

            if (isReverting) {
              // 只需要等重整後畫面繪製好，就直接淡出動畫
              setTimeout(revealPage, 600);
            } else {
              // 3. 監聽 Google 翻譯完成的 class
              observer = new MutationObserver(function(mutations) {
                if (document.documentElement.classList.contains('translated-ltr') || document.documentElement.classList.contains('translated-rtl')) {
                  revealPage();
                }
              });
              observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
              
              // 4. Timeout 安全機制 (2.5秒)
              fallbackTimer = setTimeout(revealPage, 2500);
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <!-- Hidden Google Translate Widget -->
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'zh-TW',
          includedLanguages: 'zh-TW,en,ja,ko,th,vi,id',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Custom Translation UI -->
    <div class="custom-translate-container skiptranslate">
      <button class="custom-translate-btn" onclick="toggleTranslateMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        <span id="current-lang-text">繁體中文</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:2px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <div class="custom-translate-menu" id="translateMenu">
        <div class="translate-option" onclick="doTranslate('zh-TW', '繁體中文')">🇹🇼 繁體中文</div>
        <div class="translate-option" onclick="doTranslate('en', 'English')">🇺🇸 English</div>
        <div class="translate-option" onclick="doTranslate('ja', '日本語')">🇯🇵 日本語</div>
        <div class="translate-option" onclick="doTranslate('ko', '한국어')">🇰🇷 한국어</div>
        <div class="translate-option" onclick="doTranslate('th', 'ภาษาไทย')">🇹🇭 ภาษาไทย</div>
        <div class="translate-option" onclick="doTranslate('vi', 'Tiếng Việt')">🇻🇳 Tiếng Việt</div>
        <div class="translate-option" onclick="doTranslate('id', 'Bahasa Indonesia')">🇮🇩 Bahasa Indonesia</div>
      </div>
    </div>
    
    <script>
      function toggleTranslateMenu() {
        document.getElementById('translateMenu').classList.toggle('show');
      }

      function doTranslate(langCode, langName) {
        document.getElementById('current-lang-text').innerText = langName;
        document.getElementById('translateMenu').classList.remove('show');
        
        // 顯示過場動畫 Spinner
        document.body.style.transition = 'opacity 0.2s ease-out';
        document.body.style.opacity = '0';
        
        var loader = document.createElement('div');
        loader.className = 'notranslate';
        loader.innerHTML = '<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#020617; z-index:99999; display:flex; justify-content:center; align-items:center; flex-direction:column; color:#f8fafc; font-family:sans-serif;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg><div style="margin-top:1rem; font-size:1.1rem; letter-spacing:1px; color:#34d399;">' + langName + '...</div><style>@keyframes spin { 100% { transform: rotate(360deg); } }</style></div>';
        document.documentElement.appendChild(loader);

        if (langCode === 'zh-TW') {
          sessionStorage.setItem('revertingToZh', 'true');
          setTimeout(() => {
            var host = location.hostname;
            var domains = [host, '.' + host];
            domains.forEach(function(d) {
              document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" + d + ";";
            });
            document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            
            // 嘗試恢復 native Google Translate 如果 combo 支援的話
            var selectField = document.querySelector(".goog-te-combo");
            if (selectField) {
              selectField.value = '';
              var event = document.createEvent("HTMLEvents");
              event.initEvent("change", true, true);
              selectField.dispatchEvent(event);
            }
            
            window.location.reload();
          }, 300);
          return;
        }

        var selectField = document.querySelector(".goog-te-combo");
        if (selectField) {
          setTimeout(() => {
            selectField.value = langCode;
            var event = document.createEvent("HTMLEvents");
            event.initEvent("change", true, true);
            selectField.dispatchEvent(event);
            
            // 等待翻譯執行後淡入並移除 loader
            setTimeout(() => {
              loader.style.opacity = '0';
              loader.style.transition = 'opacity 0.3s ease';
              setTimeout(() => { if(loader.parentNode) loader.parentNode.removeChild(loader); }, 300);
              
              document.body.style.transition = 'opacity 0.3s ease-in';
              document.body.style.opacity = '1';
            }, 600);
          }, 200);
        } else {
          // 若元件尚未載入，強制寫入 cookie 並重整
          document.cookie = "googtrans=/zh-TW/" + langCode + "; path=/;";
          window.location.reload();
        }
      }
      
      // 初始化檢查是否有設定 cookie 來決定初始按鈕顯示
      window.addEventListener('DOMContentLoaded', () => {
        const match = document.cookie.match(/googtrans=\/zh-TW\/([a-z-]+)/i);
        if (match && match[1]) {
          const langMap = {
            'en': 'English',
            'ja': '日本語',
            'ko': '한국어',
            'th': 'ภาษาไทย',
            'vi': 'Tiếng Việt',
            'id': 'Bahasa Indonesia'
          };
          if (langMap[match[1]]) {
            document.getElementById('current-lang-text').innerText = langMap[match[1]];
          }
        }
      });

      // Close menu when clicking outside
      window.addEventListener('click', function(e) {
        if (!document.querySelector('.custom-translate-container').contains(e.target)) {
          var menu = document.getElementById('translateMenu');
          if (menu && menu.classList.contains('show')) {
            menu.classList.remove('show');
          }
        }
      });
    </script>

    <div class="bg-mesh"></div>

    <div class="container">
      <header class="hero">
        <div class="title-badge">Taiwan Open Data</div>
        <h1>尋找安心的旅宿<br>從合法登記開始</h1>
        <p>整合交通部觀光署開放資料庫，提供最即時、權威的台灣合法旅館與民宿查詢服務。拒絕日租套房，保障您的旅遊安全。</p>
        
        <!-- 附近搜尋功能列 (整合自行旅專案) -->
        <div class="nearby-controls" style="display: flex; gap: 0.8rem; margin-bottom: 1.5rem; justify-content: center; flex-wrap: wrap;">
          <select id="distanceSelect" class="search-input" style="width: auto; min-width: 200px; padding: 0.8rem 1.5rem; border-radius: 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
              <option value="0,0.5" style="color: black;">距離 0 ~ 500 公尺</option>
              <option value="0.5,1" style="color: black;">距離 500 公尺 ~ 1 公里</option>
              <option value="1,5" style="color: black;">距離 1 ~ 5 公里</option>
              <option value="5,10" style="color: black;">距離 5 ~ 10 公里</option>
          </select>
          <button type="button" id="locateBtn" class="search-btn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); box-shadow: none;">
              📍 以現在位子找附近高 CP 值住宿
          </button>
        </div>

        <div class="search-wrapper">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="輸入旅宿名稱、地區或地址 (例如：台北、阿里山、知本)" autocomplete="off" />
            <button id="searchBtn" class="search-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <span>搜尋</span>
            </button>
            <div id="suggestionsBox" class="suggestions-dropdown hidden"></div>
          </div>
        </div>
      </header>

      <main id="resultsContainer">
        <!-- Loading state -->
        <div id="loading" class="state-panel hidden">
          <div class="spinner"></div>
          <h3>AI 智慧搜尋中</h3>
          <p>正在比對全台合法旅宿資料...</p>
        </div>
        
        <!-- Initial state -->
        <div id="initial" class="state-panel">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          <h3>開始您的探索</h3>
          <p>在上方搜尋列輸入關鍵字，即可快速找尋合法旅宿</p>
        </div>

        <!-- No results state -->
        <div id="noResults" class="state-panel hidden">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
          <h3>找不到符合條件的旅宿</h3>
          <p>可能是該旅宿未合法登記，或請嘗試更換關鍵字重新搜尋</p>
        </div>

        <!-- Results -->
        <div id="hotelList" class="hotel-list hidden">
          <!-- Cards will be injected via JS -->
        </div>
      </main>
    </div>

    <!-- Hotel Details Modal -->
    <div id="hotelModal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <button id="closeModalBtn" class="close-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div id="modalBody">
          <!-- Dynamically injected content -->
        </div>
      </div>
    </div>

    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
